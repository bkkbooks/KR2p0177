body:
  text: 睡虎地秦墓竹簡法律答問害盜別徼而盜駕罪之可謂駕罪五人盜臧一錢以上斬左止有黥以為城旦不盈五人盜過六百六十錢黥劓以為城旦不盈六百六十到二百草錢黥為城旦不盈二百草以下到一錢䙲之求盜比此求盜盜當刑為城旦問罪當駕如害盜不當當甲謀遣乙盜一日乙且往盜未到得皆贖黥人臣甲謀遣人妾乙盜主牛買把錢偕邦亡出徼得論各可殹當城旦黥之各畀主甲盜牛盜牛時高六尺毄一歲復丈高六尺七寸問甲可論當完城旦或盜采人桑葉臧不盈一錢可論資繇三旬司寇盜百一十錢先自告可論當耐為隸臣或曰資二甲甲盜臧直千錢乙智其盜受分臧不盈一錢問乙可論同論甲盜不盈一錢行乙室乙弗覺問乙論可殹毋論其見智之而弗捕當資一盾甲盜錢以買絲寄乙乙受弗智盜乙論可殹毋論甲乙雅不相智甲往盜丙毚到乙亦往盜丙與甲言即各盜其臧直各四百已去而偕得其前謀當并臧以論不謀各坐臧工盜以出臧不盈一錢其曹人當治不當不當治夫盜千錢妻所匿三百可以論妻妻智夫盜而匿之當以三百論為盜不智為收夫盜三百錢告妻妻與共飲食之可以論妻非前謀殹當為收其前謀同罪夫盜二百錢妻所匿百一十可以論妻妻智夫盜以百一十為盜弗智為守臧削盜臧直百一十其妻子智與食肉當同罪削盜臧直百五十告甲甲與其妻子智共食肉甲妻子與甲同罪父盜子不為盜今假父盜假子可論當為盜律曰與盜同法有曰與同罪此二物其同居典伍當坐之云與同罪云反其罪者弗當坐人奴妾盜其主之父母為盜主且不為同居者為盜主不同居不為盜主盜及者它罪同居所當坐可謂同居戶為同居坐隸隸不坐戶謂殹盜盜人買所盜以買它物皆畀其主今盜盜甲衣買以買布衣而得當以衣及布畀不當當以布及其它所買畀甲衣不當公祠未𨶅盜其具當資以下耐為隸臣今或益一腎益一腎臧不盈一錢可論祠固用心腎及它支物皆各為一具一具之臧不盈一錢盜之當耐或直草錢而柀盜之不盡一具及盜不直者以律論可謂祠未𨶅置豆俎鬼前未徹乃為未𨶅未置及不直者不為具必已置乃為具可謂盜埱王室祠貍其具是謂士五甲盜一羊羊頸有索索直一錢問可論甲意所盜羊殹而索繫羊甲即牽羊去議不為過羊抉籥贖黥可謂抉籥抉籥者已抉啓之乃為抉且未啓亦為抉抉之弗能啓即去一日而得論皆可殹抉之且欲有盜弗能啓即去若未啓而得當贖黥抉之非欲盜殹已啓乃為抉未啓當資二甲府中公金錢私貣用之與盜同法可謂府中唯縣少內為府中其它不為士五甲盜以得時直臧臧直過六百六十吏弗直其獄鞫乃直臧臧直百一十以論耐問甲及吏可論甲當黥為城旦吏為失刑罪或端為為不直士五甲盜以得時直臧臧直百一十吏弗直獄鞫乃直臧臧直過六百六十黥甲為城旦問甲及吏可論甲當耐為隸臣吏為失刑罪甲有罪吏智而端重若輕之論可殹為不直或以赦前盜千錢赦後盡用之而得論可殹毋論告人盜百一十問盜百告者可論當資二甲盜百即端盜駕十錢問告者可論當資一盾資一盾應律雖然廷行事以不審論資二甲告人盜千錢問盜六百七十告者可論毋論誣人盜千錢問盜六百七十誣者可論毋論甲告乙盜直問乙盜卅甲誣駕乙五十其卅不審問甲當論不當廷行事資二甲甲告乙盜牛若賊傷人今乙不盜牛不傷人問甲可論端為為誣人不端為告不審甲告乙盜牛今乙賊傷人非盜牛殹問甲當論不當不當論亦不當購或曰為告不審甲盜羊乙智即端告曰甲盜牛問乙為誣人且為告不審當為告盜駕臧甲盜羊乙智盜羊而不智其羊數即告吏曰盜三羊問乙可論為告盜駕臧甲告乙盜牛今乙盜羊不盜牛問可論為告不審資盾不直可論資盾當資盾沒錢五千而失之可論當誶告人曰邦亡未出徼闌亡告不審論可殹為告黥城旦不審誣人盜直草未斷有有它盜直百乃後覺當并臧以論且行真罪有以誣人論當資二甲一盾上造甲盜一羊獄未斷誣人曰盜一豬論可殹當完城旦譽適以恐衆心者翏翏者可如生翏翏之已乃斬之之謂殹廣衆心聲聞左右者賞將軍材以錢若金賞毋恆數有投書勿發見輒燔之能捕者購臣妾二人毄投書者鞫審𤅊之所謂者見書而投者不得燔書勿發投者得書不燔鞫審𤅊之之謂殹僑丞令可殹為有秩偽寫其印為大嗇夫盜封嗇夫可論廷行事以偽寫印發偽書弗智資二甲今咸陽發偽傳弗智即復封傳它縣它縣亦傳其縣次到關而得今當獨咸陽坐以資且它縣當盡資咸陽及它縣發弗智者當皆資廷行事吏為詛偽資盾以上行其論有廢之廷行事有罪當䙲已斷已令未行而死若亡其所包當詣䙲所嗇夫不以官為事以姦為事論可殹當䙲䙲者妻當包不當不當包當䙲其妻先自告當包將上不仁邑里者而縱之可論當毄作如其所縱以須其得有爵作官府盜徙封贖耐可如為封封即田千佰頃半封殹且非是而盜徙之贖耐可重也是不重內姦贖耐今內人人未蝕姦而得可論除求盜追捕罪人罪人挌殺求盜問殺人者為賊殺人且斫殺斫殺人廷行事為賊甲謀遣乙盜殺人受分十錢問乙高未盈六尺甲可論當磔甲殺人不覺今甲病死已葬人乃後告甲甲殺人審問甲當論及收不當告不聽擅殺子黥為城旦舂其子新生而有怪物其身及不全而殺之勿罪今生子子身全殹毋怪物直以多子故不欲其生即弗舉而殺之可論為殺子士五甲毋子其弟子以為後與同居而擅殺之當棄市擅殺刑髡其後子𤅊之可謂後子官其男為爵後及臣邦君長所置為後大子皆為後子人奴擅殺子城旦黥之畀主人奴妾治子子以股死黥顏頯畀主相與鬭交傷皆論不殹交論臣強與主姦可論比毆主鬭折脊頸骨可論比折支臣妾牧殺主可謂牧欲賊殺主未殺而得為牧或自殺其室人弗言吏即葬貍之問死者有妻子當收弗言而葬當資一甲毆大父母黥為城旦舂今毆高大父母可論比大父母妻悍夫毆治之夬其耳若折支指胅𦡊問夫可論當耐律曰鬭夬人耳耐今夬耳故不穿所夬非珥所入殹可論律所謂非必珥所入乃為夬夬裂男若女耳皆當耐或與人鬭縛而盡拔其須麋論可殹當完城旦拔人髮大可如為提智以上為提或鬭嚙斷人鼻若耳若指若唇論各可殹議皆當耐士五甲鬭拔劍伐斬人髮結可論當完為城旦鈹戟矛有室者拔以鬭未有傷殹論比劍鬭以針鉥錐若針鉥錐傷人各可論鬭當資二甲賊當黥為城旦或與人鬭夬人唇論可殹比疻痏或鬭嚙人頯若顏其大方一寸深半寸可論比疻痏鬭為人毆殹毋疻痏毆者顧折齒可論各以其律論之邦客與主人鬭以兵刃投梃拳指傷人𢰞以布可謂𢰞𢰞布入公如資布入齎錢如律以梃賊傷人可謂梃木可以伐者為梃小畜生入人室室人以投梃伐殺之所殺直二百五十錢可論當資二甲論獄何謂不直可謂縱囚罪當重而端輕之當輕而諯重之是謂不直當論而端弗論及易其獄端令不致論出之是謂縱囚贖罪不直史不與嗇夫和問史可論當資一盾辭者辭廷今郡守為廷不為為殹辭者不先辭官長嗇夫可謂官長可謂嗇夫命都官曰長縣曰嗇夫伍人相告且以辟罪不審以所辟罪罪之有曰不能定罪人而告它人為告不審今甲曰伍人乙賊殺人即執乙問不殺人甲言不審當以告不審論且以所辟以所辟論當殹賊入甲室賊傷甲甲號寇其四鄰典老皆出不存不聞號寇問當論不當審不存不當論典老雖不存當論可謂四鄰四鄰即伍人謂殹可謂州告州告者告罪人其所告且不審有以它事告之勿聽而論其不審有賊殺傷人衝術偕旁人不援百步中比壄當資二甲免老告人以為不孝謁殺當三環之不不當環亟執勿失公室告何殹非公室告可殹賊殺傷盜它人為公室子盜父母父母擅殺刑髡子及奴妾不為公室告子告父母臣妾告主非公室告勿聽可謂非公室告主擅殺刑髡其子臣妾是謂非公室告勿聽而行告告者罪告者罪已行它人有襲其告之亦不當聽家人之論父時家罪殹父死而誧告之勿聽可謂家罪家罪者父殺傷人及奴妾父死而告之勿治葆子以上未獄而死若已葬而誧告之亦不當聽治勿收皆如家罪可謂家罪父子同居殺傷父臣妾畜産及盜之父已死或告勿聽是胃家罪有收當耐未斷以當刑隸臣罪誣告人是謂當刑隸臣葆子未斷而誣告人其罪當刑城旦耐以為鬼薪鋈足藉葆子之謂殹葆子獄未斷而誣告人其罪當刑為隸臣勿刑行其耐有毄城旦六歲可謂當刑為隸臣葆子未斷而誣告人其罪當刑城旦耐以為鬼薪而鋈足藉葆子之謂殹也有收當耐未斷以當刑隸臣罪誣告人是謂當刑隸臣葆子獄未斷而誣告人其罪當刑鬼薪勿刑行其耐有毄城旦六歲可謂當刑為鬼薪當耐為鬼薪未斷以當刑隸臣及完城旦誣告人是謂當刑鬼薪可謂贖鬼薪鋈足可謂贖宮臣邦真戎君長爵當上造以上有罪當贖者其為羣盜令贖鬼薪鋈足其有府罪贖宮其它罪比羣盜者亦如此以乞鞫及為人乞鞫者獄已斷乃聽且未斷猶聽殹獄斷乃聽之失鋈足論可殹如失刑罪隸臣將城旦亡之完為城旦收其外妻子子小未可別令從母為收可謂從母為收人固買子小不可別弗買子母謂殹當耐司寇而以耐隸臣誣人可論當耐為隸臣當耐為侯罪誣人可論當耐為司寇當耐為隸臣以司寇誣人可論當耐為隸臣有毄城旦六歲完城旦以黥城旦誣人可論當黥甲賊傷人吏論以為鬭傷人吏當論不當當誶當黥城旦而以完城旦誣人可論當黥劓癘者有罪定殺定殺可如生定殺水中之謂殹或曰生埋生埋之異事殹甲有完城旦罪未斷今甲癘問甲可以論當䙲癘所處之或曰當䙲䙲所定殺城旦鬼薪癘可論當䙲癘䙲所捕資罪即端以劍及兵刃刺殺之可論殺之完為城旦傷之耐為隸臣將司人而亡能自捕及親所智為捕除毋罪已刑者處隱官可罪得處隱官羣盜赦為庶人將盜戒囚刑罪以上亡以故罪論斬左止為城旦後自捕所亡是謂處隱官它罪比羣盜者皆如此大夫甲堅鬼薪鬼薪亡問甲可論當從事官府須亡者得今甲從事有去亡一月得可論當資一盾復從事從事有亡卒歲得可論當耐餽遺亡鬼薪於外一以上論可殹毋論捕亡亡人操錢捕得取錢所捕耐罪以上得取把其假以亡得及自出當為盜不當自出以亡論其得坐臧為盜盜罪輕於亡以亡論隸臣妾毄城旦舂去亡已奔未論而自出當治五十備毄日罷𤵸守官府亡而得得比公𤵸不得得比焉甲告乙賊傷人問乙賊殺人非傷殹甲當購購幾可當購二兩捕亡完城旦購幾可當購二兩夫妻子五人共盜皆當刑城旦今中盡捕告之問甲當購幾可人購二兩夫妻子十人共盜當刑城旦亡今甲捕得其八人問甲當購幾可當購人二兩甲捕乙告盜書丞印以亡問亡二日它如甲已論耐乙問甲當購不當不當有秩吏捕闌亡者以畀乙令詣約分購問吏及乙論可殹當資各二甲勿購盜出朱玉邦關及買於客者上朱玉內史內史材鼠購可以購之其耐罪以上購如捕它罪人資罪不購或捕告人奴妾盜百一十錢問主購之且公購公購之之可如為犯令法令律所謂者令曰勿為而為之是謂犯令令曰為之弗為是謂法令殹廷行事皆以犯令論法令犯令遝免徙不遝遝之郡縣除佐事它郡縣而不視其事者可論以小犯令論任人為丞丞已免後為令今初任者有罪令當免不當不當免亡久書符券公璽衡羸已坐以論後自得所亡論當除不當不當甲徙居徙數謁吏吏環弗為更籍今甲有耐資罪問吏可論耐以上當資二甲百姓有責勿敢擅強質擅強質及和受質者皆資二甲廷行事強質人者論鼠者不論和受質者鼠者論實官戶關不致容指若抉廷行事資一甲實官戶扇不致禾稼能出廷行事資一甲空倉中有薦薦下有稼一石以上廷行事資一甲令史監者一盾倉鼠穴幾可而當論及誶廷行事鼠穴三以上資一盾二以下誶鼷穴三當一鼠穴有稟叔麥當出未出即出禾以當叔麥叔麥賈賤禾貴其論可殹當資一甲會赦未論有亡赦期已盡六月而得當耐吏有故當止食弗止盡稟出之論可殹當坐所贏出為盜吏從事於官府當坐伍人不當不當大夫寡當伍及人不當不當部佐匿者民田者民弗智當論不當部佐為匿田且可為已租者民弗言為匿田未租不論為匿田甲小未盈六尺有馬一匹自牧之今馬為人敗食人稼一石問當論不當不當論及賞稼舍公官旞火燔其舍雖有公器勿責今舍公官旞火燔其假乘車馬當負不當出當出之旞火延燔里門當資一盾其邑邦門資一甲擅興奇祠資二甲可如為奇王室所當祠固有矣擅有鬼立殹為奇它不為毋敢履錦履履錦履之狀可如律所謂者以絲雜織履履有文乃為錦履以錦縵履不為然而行事比焉不會治未盈卒歲得以將陽有行治今士五甲不會治五十未卒歲而得治當駕不當當可謂逋事及乏繇律所謂者當繇吏典已令之即亡弗會為逋事已閲及敦車食若行到繇所乃亡皆為乏繇可謂匿戶及敖童弗傅匿戶弗繇使弗令出戶賦之謂殹女子甲為人妻去亡得及自出小未盈六尺當論不當已官當論未官不當論女子甲去夫亡男子乙亦闌亡相夫妻甲弗告請居二歲生子乃告請乙即弗棄而得論可殹當黥城旦舂甲取人亡妻以為妻不智亡有子焉今得問安置其子當畀或入公入公異是棄妻不書資二甲其棄妻亦當論不當資二甲夫有罪妻先告不收妻賸臣妾衣器當收不當不當收妻有罪以收妻賸臣妾衣器當收且畀夫畀夫同母異父相與姦可論棄市甲乙交與女子丙姦甲乙以其故相刺傷丙弗智丙論可殹毋論女子為隸臣妻有子焉今隸臣死女子北其子以為非隸臣子殹問女子論可殹或黥顏頯為隸妾或曰完完之當殹以其乘車載女子可論資二甲以乘馬駕私車而乘之毋論臣邦人不安其主長而欲去夏者勿許可謂夏欲去秦屬是謂夏真臣邦君公有罪致耐罪以上令贖可謂真臣邦父母産子及産它邦而是謂真可謂夏子臣邦父秦母謂殹者侯客來者以火炎其衡厄炎之可當者侯不治騷馬騷馬蟲皆麗衡厄鞅韅轅紳是以炎之可謂亡券而害亡校券右為害使者侯外臣邦其邦徒及偽吏不來弗坐可謂邦徒偽使徒吏與偕使而弗為私舍人是謂邦徒偽使邦亡來通錢過萬已復後來盜而得可以論之以通錢智人通錢而為臧其主已取錢人後告臧者臧者論不論不論論甲誣乙通一錢黥城旦罪問甲同居典老當論不當不當客未布吏而與賈資一甲可謂布吏詣符傳於吏是謂布吏內公孫毋爵者當贖刑得比公士贖耐不得得比焉越里中之與它里界者垣為完不為巷相直為院宇相直者不為院可謂宮均人宮中主循者殹可謂宮更人宮隸有刑是謂宮更人可謂宮狡士外狡士皆主王犬者殹可謂甸人甸人守孝公𤅊公冢者殹可謂宦者顯大夫宦及智於王及六百石吏以上皆為顯大夫可謂爨人古主爨竈者殹可謂集人古主取薪者殹可謂耐卜隸耐史隸卜史當耐者皆耐以為卜史隸後更其律如它可謂人貉謂人貉者其子入養主之謂也不入養主當收雖不養主而入量者不收畀其主可謂署人更人藉牢有六署囚道一署旞所道旞者命曰署人其它皆為更人或曰守囚即更人殹原者署人殹可謂竇署竇署即去殹且非是是其論可殹即去署殹可謂𧗵敖𧗵敖當里典謂殹可謂逵卒有大繇而曹鬭相趣是謂逵卒可謂旅人寄及客是謂旅人可謂室人可謂同居同居獨戶母之謂殹室人者一室盡當坐罪人之謂殹可謂瓊瓊者玉檢殹節亡玉若人貿易之視檢智小大以論及以齎負之可謂玉玉者候客節來使入秦當以玉問王之謂殹可謂篋面篋面藉秦人使它邦耐吏行旞與偕者命客吏曰篋行旞曰面可謂臧人臧人者甲把其衣錢匿臧乙室即告亡欲令乙為盜之而實弗盜之謂殹貣人贏律及介人可謂介人不當貣貣之是謂介人氣人贏律及介人可謂介人不當氣而誤氣之是謂介人可如為大痍大痍者支或未斷及將長令二人扶出之為大痍可如為大誤人戶馬牛及者貨材直過六百六十錢為大誤其它為小可謂羊𦗛羊𦗛草實可食殹
